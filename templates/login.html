<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — World Cup 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f6f8; font-family: Arial, sans-serif; color: #222;
           display: flex; flex-direction: column; min-height: 100vh; }

    header { background: #1e6e3c; color: white; padding: 20px 32px; }
    header h1 { font-size: 22px; font-weight: bold; }

    .center { flex: 1; display: flex; align-items: center; justify-content: center; }

    .card {
      background: white; border-radius: 8px; padding: 32px 36px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12); width: 100%; max-width: 360px;
    }
    .card h2 { font-size: 18px; color: #1e6e3c; margin-bottom: 22px; font-weight: bold; }

    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; }
    input[type=password] {
      width: 100%; padding: 10px 12px; border: 1px solid #ccc;
      border-radius: 5px; font-size: 14px; margin-bottom: 18px;
    }
    input[type=password]:focus { outline: none; border-color: #1e6e3c; box-shadow: 0 0 0 2px rgba(30,110,60,0.15); }

    .btn { width: 100%; padding: 11px; border: none; border-radius: 5px;
           background: #1e6e3c; color: white; font-size: 14px; font-weight: bold;
           cursor: pointer; }
    .btn:hover { background: #165530; }

    .error { background: #fdecea; color: #c0392b; border-radius: 5px;
             padding: 9px 12px; font-size: 13px; margin-bottom: 16px; }

    .back { display: block; text-align: center; margin-top: 16px;
            color: #1e6e3c; font-size: 13px; text-decoration: none; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>&#9917; World Cup 2026 Predictor</h1>
</header>

<div class="center">
  <div class="card">
    <h2>&#128274; Admin Login</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus placeholder="Enter password">
      <button type="submit" class="btn">Log In</button>
    </form>
    <a href="/" class="back">&#8592; Back to leaderboard</a>
  </div>
</div>

</body>
</html>
